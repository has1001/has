name: Flyer OCR → Google Sheets

on:
  schedule:
    # 毎日 06:00 JST (= 21:00 UTC前日) に実行
    - cron: "0 21 * * *"
  workflow_dispatch:  # 手動実行も可能

jobs:
  process-flyers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: OCR + Sync
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python scripts/ocr_process.py

      - name: Show result (CSV export link)
        if: success()
        run: |
          echo "✅ Flyer OCR 完了"
          echo "Google Sheets: https://docs.google.com/spreadsheets/d/${{ secrets.GOOGLE_SHEET_ID }}"
