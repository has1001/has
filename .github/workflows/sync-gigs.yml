name: Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "=== SECRETS ===" && echo "SHEET: $(echo $GOOGLE_SHEET_ID | head -c 10)" && echo "CREDS: $(echo $GOOGLE_CREDENTIALS | head -c 10)" && echo "DRIVE: $(echo $DRIVE_FOLDER_ID | head -c 10)" && echo "=== DONE ==="
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
