name: Flyer OCR → Google Sheets

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  process-flyers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r scripts/requirements.txt

      - run: echo "===SECRETS===" && echo "SHEET_ID: ${SHEET_ID_DEBUG:-${{ secrets.GOOGLE_SHEET_ID }}" | head -c 10 && echo "..." && echo "CREDS: ${CREDS_DEBUG:-${{ secrets.GOOGLE_CREDENTIALS }}" | head -c 10 && echo "..."

      - run: |
          python scripts/ocr_process.py
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
