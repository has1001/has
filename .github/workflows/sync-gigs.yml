name: Sync Gigs from gigs.md to Google Sheets

on:
  schedule:
    # 毎日 UTC 21:00 (日本時間 06:00) に実行
    - cron: '0 21 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: read
  issues: write

jobs:
  sync-gigs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install gspread google-auth google-cloud-vision

      - name: Parse gigs.md
        id: parse
        run: |
          python scripts/parse_gigs_md.py

      - name: Sync to Google Sheets
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python scripts/sync_to_sheets.py

      - name: OCR Flyer Images
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          if [ -d "flyers" ] && [ "$(ls -A flyers 2>/dev/null)" ]; then
            python scripts/ocr_flyers.py
          fi

      - name: Commit updated gigs.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gigs.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update gigs.md [skip ci]" || true
          git push || true
